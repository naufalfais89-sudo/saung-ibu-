<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saung Ibu - PRO Order</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f5f5}
header{background:#1e272e;color:#fff;text-align:center;padding:20px}
.container{padding:20px}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.item{background:#fff;padding:10px;border-radius:8px}
.item h4{margin-bottom:5px}
.controls{display:flex;justify-content:space-between;align-items:center}
button{background:#25D366;color:#fff;border:none;padding:5px 10px;border-radius:5px;margin:2px}
.cart{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:2px solid #ddd;padding:10px;max-height:50%;overflow:auto}
input{width:100%;padding:8px;margin:5px 0}
</style>
</head>
<body><header>
<h1>Saung Ibu</h1>
<p>Order Online Lengkap</p>
</header><div class="container">
<h2>Menu</h2>
<div class="menu"><div class="item">
<h4>Nasi Goreng Ayam</h4>
<div class="controls">
<span>25000</span>
<button onclick="add('Nasi Goreng Ayam',25000)">Tambah</button>
</div>
</div><div class="item">
<h4>Nasi Goreng Seafood</h4>
<div class="controls">
<span>30000</span>
<button onclick="add('Nasi Goreng Seafood',30000)">Tambah</button>
</div>
</div><div class="item">
<h4>Mie Goreng Seafood</h4>
<div class="controls">
<span>30000</span>
<button onclick="add('Mie Goreng Seafood',30000)">Tambah</button>
</div>
</div><div class="item">
<h4>Es Teh Manis</h4>
<div class="controls">
<span>5000</span>
<button onclick="add('Es Teh Manis',5000)">Tambah</button>
</div>
</div></div>
</div><div class="cart">
<h3>Keranjang</h3>
<div id="cartItems"></div>
<p><b>Total: Rp <span id="total">0</span></b></p><h4>Data Pembeli</h4>
<input type="text" id="nama" placeholder="Nama">
<input type="text" id="alamat" placeholder="Alamat">
<input type="number" id="ongkir" placeholder="Ongkir (isi sendiri)"><button onclick="checkout()">Checkout WhatsApp</button>

</div><script>
let cart = [];

function add(nama,harga){
 let item = cart.find(i=>i.nama===nama);
 if(item){item.qty++} else {cart.push({nama,harga,qty:1})}
 render();
}

function changeQty(index,delta){
 cart[index].qty += delta;
 if(cart[index].qty<=0) cart.splice(index,1);
 render();
}

function render(){
 let html='';
 let total=0;
 cart.forEach((item,i)=>{
  total += item.harga*item.qty;
  html += `<div>${item.nama} x${item.qty} = ${item.harga*item.qty}
  <button onclick="changeQty(${i},1)">+</button>
  <button onclick="changeQty(${i},-1)">-</button>
  </div>`;
 });
 document.getElementById('cartItems').innerHTML = html || 'Kosong';
 document.getElementById('total').innerText = total;
}

function checkout(){
 let phone='6281210702227';
 let nama=document.getElementById('nama').value;
 let alamat=document.getElementById('alamat').value;
 let ongkir=parseInt(document.getElementById('ongkir').value)||0;

 let text='Halo, saya ingin pesan:%0A';
 let total=0;

 cart.forEach(item=>{
  text += `- ${item.nama} x${item.qty} = ${item.harga*item.qty}%0A`;
  total += item.harga*item.qty;
 });

 text += `%0ATotal Makanan: Rp${total}`;
 text += `%0AOngkir: Rp${ongkir}`;
 text += `%0ATotal Bayar: Rp${total+ongkir}`;
 text += `%0A%0ANama: ${nama}`;
 text += `%0AAlamat: ${alamat}`;

 window.open('https://wa.me/'+phone+'?text='+text);
}
</script></body>
</html>
